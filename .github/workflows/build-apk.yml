name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Android debug keystore
        uses: actions/cache@v3
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-${{ runner.os }}
          restore-keys: |
            debug-keystore-${{ runner.os }}


      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean build
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Keystore if missing
        run: |
          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Generating new debug keystore..."
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
          fi

      - name: Print Keystore Fingerprints
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android || echo "Keystore not found!"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanceAI-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
